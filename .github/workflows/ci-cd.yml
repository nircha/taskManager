name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest
    env:

      IMAGE_TAG: ${{ github.sha }}
      CONTAINER_PORT: 3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY}}:$IMAGE_TAG .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY}}:$IMAGE_TAG

      - name: Get runner public IP
        id: ip
        run: echo "IP=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Allow SSH from runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.IP }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: SSH and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
            docker pull ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY}}:$IMAGE_TAG
            docker stop task-manager || true
            docker rm task-manager || true
            docker run -d --name task-manager -p 3000:3000 ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY}}:$IMAGE_TAG

      - name: Cleanup of SSH rule
        run: |
          aws ec2 revoke-security-group-ingress 
            --group-id ${{ secrets.EC2_SG_ID }} 
            --protocol tcp 
            --port 22 
            --cidr ${{ steps.ip.outputs.IP }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
